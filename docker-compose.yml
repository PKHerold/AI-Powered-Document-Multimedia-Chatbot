version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: docqa-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: docqa-backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DB_NAME=docqa
      - UPLOAD_DIR=uploads
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - upload_data:/app/uploads
      - faiss_data:/app/faiss_store
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: docqa-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
  upload_data:
  faiss_data:
